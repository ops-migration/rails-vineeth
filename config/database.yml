default: &default
  adapter: postgresql
  encoding: unicode
  pool: <%= ENV.fetch("RAILS_MAX_THREADS") { 5 } %>

development:
  <<: *default
  database: taskmanager_development
  host: localhost
  username: rails
  password: password

test:
  <<: *default
  database: taskmanager_test

production:
  <<: *default
  url: <%= ENV["DATABASE_URL"] %>
