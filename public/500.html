<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>500 – Internal Server Error | TaskManager</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: ui-sans-serif, system-ui, -apple-system, sans-serif;
      background: #f8fafc;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #1e293b;
    }
    .container { text-align: center; padding: 2rem; max-width: 480px; }
    .code {
      font-size: 6rem;
      font-weight: 800;
      color: #dc2626;
      line-height: 1;
      letter-spacing: -4px;
    }
    h1 { font-size: 1.5rem; font-weight: 700; margin: 1rem 0 0.5rem; }
    p  { color: #64748b; font-size: 0.9375rem; line-height: 1.6; }
    a {
      display: inline-block;
      margin-top: 1.5rem;
      background: #4f46e5;
      color: white;
      padding: 0.625rem 1.5rem;
      border-radius: 0.5rem;
      text-decoration: none;
      font-weight: 600;
      font-size: 0.875rem;
      transition: background 150ms;
    }
    a:hover { background: #4338ca; }
  </style>
</head>
<body>
  <div class="container">
    <div class="code">500</div>
    <h1>Something went wrong</h1>
    <p>We're sorry — the server encountered an unexpected error. Please try again in a moment.</p>
    <a href="/">← Back to TaskManager</a>
  </div>
</body>
</html>
