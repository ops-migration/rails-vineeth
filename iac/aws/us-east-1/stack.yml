AWSTemplateFormatVersion: '2010-09-09'
Description: 'Nested ECR Repository for Docker Images'

# ─── Grouped common parameters ────────────────────────────────────────────────
Parameters:
  RailsImage:
    Type: String                          # always required

  NginxImage:
    Type: String
    Default: ''                           # optional — only used in double mode

  CommitHash:
    Type: String
    Default: ''
    
  Environment:
    Type: String
    Default: dev

  ALBListenerArn:
    Type: String
    Default: arn:aws:elasticloadbalancing:us-east-1:123456789012:listener/app/my-alb/abc123/def456

  ECSClusterName:
    Type: String
    Default: my-existing-ecs-cluster

  AppName:
    Type: String
    Default: function-manager

  # Single source-of-truth for all nested template URLs
  TemplateBucketUrl:
    Type: String
    Default: https://s3.amazonaws.com/my-cfn-templates-bucket/templates

  # Single source-of-truth for all nested policy file URLs
  PolicyBucketUrl:
    Type: String
    Default: https://s3.amazonaws.com/my-cfn-templates-bucket/policies

  VpcId:
    Type: AWS::EC2::VPC::Id
    Default: vpc-0abc123456789def0
    
Conditions:
  IsDoubleContainer: !Not [!Equals [!Ref NginxImage, '']]
# ─── Resources ────────────────────────────────────────────────────────────────
Resources:
# ─────── ECR ────────────────────────────────────────────────────────
  FunctionManagerECRStack:
    Type: AWS::CloudFormation::Stack
    Properties:
      TemplateURL: !Sub '${TemplateBucketUrl}/ecr.yaml'
      Parameters:
        AppName: !Ref AppName
        Environment: !Ref Environment
      Tags:
        - Key: Name
          Value: !Sub '${Environment}-${AppName}-ecr'
        - Key: Environment
          Value: !Ref Environment
        - Key: ManagedBy
          Value: CloudFormation

# ─────── Secret Manager ────────────────────────────────────────────────────────

  FunctionManagerSecretsManagerStack:
    Type: AWS::CloudFormation::Stack
    Properties:
      TemplateURL: !Sub '${TemplateBucketUrl}/secretsmanager.yaml'
      Parameters:
        Environment: !Ref Environment
        AppName: !Ref AppName
      Tags:
        - Key: Name
          Value: !Sub '${Environment}-function-manager'
        - Key: Environment
          Value: !Ref Environment
        - Key: ManagedBy
          Value: CloudFormation

# ─────── S3 ────────────────────────────────────────────────────────

  FunctionManagerS3Stack:
    Type: AWS::CloudFormation::Stack
    Properties:
      TemplateURL: !Sub '${TemplateBucketUrl}/s3.yaml'
      Parameters:
        BucketNames: !Sub '${Environment}-function-manager'
        Environment: !Ref Environment
      Tags:
        - Key: Name
          Value: !Sub '${Environment}-function-manager'
        - Key: Environment
          Value: !Ref Environment
        - Key: ManagedBy
          Value: CloudFormation

# ─────── IAM Role ────────────────────────────────────────────────────────

  FunctionManagerIAMStack:
    Type: AWS::CloudFormation::Stack
    DependsOn:
      - FunctionManagerS3Stack
      - FunctionManagerSecretsManagerStack
    Properties:
      TemplateURL: !Sub '${TemplateBucketUrl}/iam-task.yaml'
      Parameters:
        Environment: !Ref Environment
        AppName: !Ref AppName
        # ── Policy loaded from a standalone file instead of inline JSON ──────
        # See: policies/iam-task-policy.json (shown below)
        TaskRolePolicyJson:
          'Fn::Transform':
            Name: 'AWS::Include'
            Parameters:
              Location: !Sub '${PolicyBucketUrl}/iam-task-policy.json'

# ─────── Target Group ────────────────────────────────────────────────────────

  FunctionManagerTargetGroupStack:
    Type: AWS::CloudFormation::Stack
    Properties:
      TemplateURL: !Sub '${TemplateBucketUrl}/target-group.yaml'
      Parameters:
        Environment: !Ref Environment
        AppName: !Ref AppName
        VpcId: !Ref VpcId
        ALBListenerArn: !Ref ALBListenerArn
        HostHeader: !Sub '${AppName}.example.com'
        TargetPort: 80   # 80 for nginx (double), 3000 for rails (single)

# ─────── Task Definition Double stack ────────────────────────────────────────────────────────

  FunctionManagerTaskDefDoubleStack:
      Type: AWS::CloudFormation::Stack
      Condition: IsDoubleContainer
      DependsOn: FunctionManagerIAMStack
      Properties:
        TemplateURL: !Sub '${TemplateBucketUrl}/rails-nginx-tf.yaml'
        Parameters:
          Environment: !Ref Environment
          AppName: !Ref AppName
          RailsImage: !Ref RailsImage
          NginxImage: !Ref NginxImage
          RailsContainerPort: 3000
          NginxContainerPort: 80
          TaskCPU: 512
          TaskMemory: 1024
          TaskRoleArn: !GetAtt FunctionManagerIAMStack.Outputs.TaskRoleArn
          ExecutionRoleArn: !GetAtt FunctionManagerIAMStack.Outputs.ExecutionRoleArn

# ─────── Task Definition Single stack ────────────────────────────────────────────────────────

  FunctionManagerTaskDefSingleStack:
    Type: AWS::CloudFormation::Stack
    Condition: !Not [IsDoubleContainer]
    DependsOn: FunctionManagerIAMStack
    Properties:
      TemplateURL: !Sub '${TemplateBucketUrl}/rails-tf.yaml'
      Parameters:
        Environment: !Ref Environment
        AppName: !Ref AppName
        RailsImage: !Ref RailsImage
        RailsContainerPort: 3000
        TaskCPU: 512
        TaskMemory: 1024
        TaskRoleArn: !GetAtt FunctionManagerIAMStack.Outputs.TaskRoleArn
        ExecutionRoleArn: !GetAtt FunctionManagerIAMStack.Outputs.ExecutionRoleArn

# ─────── ECS Service ────────────────────────────────────────────────────────

  FunctionManagerECSServiceStack:
    Type: AWS::CloudFormation::Stack
    DependsOn:
      - FunctionManagerTargetGroupStack
    Properties:
      TemplateURL: !Sub '${TemplateBucketUrl}/ecs-service.yaml'
      Parameters:
        Environment: !Ref Environment
        AppName: !Ref AppName
        ECSClusterName: !Ref ECSClusterName
        # Pick the correct task def ARN based on mode
        TaskDefinitionArn: !If
          - IsDoubleContainer
          - !GetAtt FunctionManagerTaskDefDoubleStack.Outputs.TaskDefinitionArn
          - !GetAtt FunctionManagerTaskDefSingleStack.Outputs.TaskDefinitionArn
        TargetGroupArn: !GetAtt FunctionManagerTargetGroupStack.Outputs.TargetGroupArn
        ContainerName: !If [IsDoubleContainer, 'nginx', 'rails']
        ContainerPort: !If [IsDoubleContainer, '80', '3000']
        DesiredCount: 1
        ScalingMinCapacity: 1
        ScalingMaxCapacity: 4
        CPUScaleOutThreshold: 70
        CPUScaleInThreshold: 30
        MemoryScaleOutThreshold: 75
        MemoryScaleInThreshold: 40
