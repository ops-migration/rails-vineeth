AWSTemplateFormatVersion: '2010-09-09'
Description: 'Nested ECR / ECS stack for function-manager'

# ─── Parameters ───────────────────────────────────────────────────────────────
Parameters:
  Environment:
    Type: String
    Default: dev
  AppName:
    Type: String
    Default: function-manager
  RailsImage:
    Type: String
  NginxImage:
    Type: String
    Default: ''  # Empty default to allow single container option
  CommitHash:
    Type: String
  TemplateBucketUrl:
    Type: String
    Default: https://ecs-migration-cloud-formation-templates.s3.us-east-1.amazonaws.com/templates
  PolicyBucketUrl:
    Type: String
    Default: s3://ecs-migration-cloud-formation-templates/templates/policies

# ─── Conditions ───────────────────────────────────────────────────────────────
Conditions:
  IsDoubleContainer: !Not [!Equals [!Ref NginxImage, '']]
  IsSingleContainer: !Not [!Condition IsDoubleContainer]

# ─── Resources ────────────────────────────────────────────────────────────────
Resources:
  # ─────── Task Definition Double stack ─────────────────────────────
  FunctionManagerTaskDefDoubleStack:
    Type: AWS::CloudFormation::Stack
    Condition: IsDoubleContainer
    Properties:
      TemplateURL: !Sub '${TemplateBucketUrl}/rails-nginx-tf.yaml'
      Parameters:
        Environment: !Ref Environment
        AppName: !Ref AppName
        RailsImage: !Ref RailsImage
        NginxImage: !Ref NginxImage
        RailsContainerPort: 3000
        NginxContainerPort: 80
        TaskCPU: 512
        TaskMemory: 1024
        TaskRoleArn: !Sub '{{resolve:ssm:/cfn/${Environment}/iam/${AppName}/TaskRoleArn}}'
        ExecutionRoleArn: !Sub '{{resolve:ssm:/cfn/${Environment}/ecs/TaskExecutionRoleArn}}'
        
  # ─────── Task Definition Single stack ─────────────────────────────
  FunctionManagerTaskDefSingleStack:
    Type: AWS::CloudFormation::Stack
    Condition: IsSingleContainer
    Properties:
      TemplateURL: !Sub '${TemplateBucketUrl}/rails-tf.yaml'
      Parameters:
        Environment: !Ref Environment
        AppName: !Ref AppName
        RailsImage: !Ref RailsImage
        RailsContainerPort: 3000
        TaskCPU: 512
        TaskMemory: 1024
        TaskRoleArn: !Sub '{{resolve:ssm:/cfn/${Environment}/iam/${AppName}/TaskRoleArn}}'
        ExecutionRoleArn: !Sub '{{resolve:ssm:/cfn/${Environment}/ecs/TaskExecutionRoleArn}}'

  # ─────── ECS Service ──────────────────────────────────────────────
  FunctionManagerECSServiceStack:
    Type: AWS::CloudFormation::Stack
    Properties:
      TemplateURL: !Sub '${TemplateBucketUrl}/ecs-service.yaml'
      Parameters:
        Environment: !Ref Environment
        AppName: !Ref AppName
        ECSClusterName: !Sub '{{resolve:ssm:/cfn/${Environment}/ecs/ClusterName}}'  # Fixed SSM parameter reference
        TaskDefinitionArn: !If
          - IsDoubleContainer
          - !GetAtt FunctionManagerTaskDefDoubleStack.Outputs.TaskDefinitionArn
          - !GetAtt FunctionManagerTaskDefSingleStack.Outputs.TaskDefinitionArn
        TargetGroupArn: !Sub '{{resolve:ssm:/cfn/${Environment}/FunctionManager/elb/TargetGroupArn}}'
        ContainerName: !If 
          - IsDoubleContainer 
          - 'nginx' 
          - 'rails'
        ContainerPort: !If 
          - IsDoubleContainer 
          - '80' 
          - '3000'
        DesiredCount: 1
        ScalingMinCapacity: 1
        ScalingMaxCapacity: 4
        CPUScaleOutThreshold: 70
        CPUScaleInThreshold: 30
        MemoryScaleOutThreshold: 75
        MemoryScaleInThreshold: 40
        VpcSubnetIds: !Sub '{{resolve:ssm:/cfn/vpc/PrivateSubnet1}},{{resolve:ssm:/cfn/vpc/PrivateSubnet2}}'  # Fixed SSM list reference
        SecurityGroupIds: !Sub '{{resolve:ssm:/cfn/${Environment}/ecs/InstanceSecurityGroupId}}'  # Fixed SSM reference

      Tags:
        - Key: Name
          Value: !Sub '${Environment}-${AppName}-service'
        - Key: Environment
          Value: !Ref Environment
        - Key: ManagedBy
          Value: CloudFormation
