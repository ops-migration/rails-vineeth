AWSTemplateFormatVersion: '2010-09-09'
Description: 'Nested ECR / ECS stack for function-manager'

# ─── Parameters ───────────────────────────────────────────────────────────────
Parameters:
  Environment:
    Type: String
    Default: dev
  AppName:
    Type: String
    Default: function-manager
  RailsImage:
    Type: String
  CommitHash:
    Type: String
  TemplateBucketUrl:
    Type: String
    Default: https://ecs-migration-cloud-formation-templates.s3.us-east-1.amazonaws.com/templates
  PolicyBucketUrl:
    Type: String
    Default: s3://ecs-migration-cloud-formation-templates/templates/policies

# ─── Conditions ───────────────────────────────────────────────────────────────
Conditions:
  IsDoubleContainer: !Not [!Equals [!Ref NginxImage, '']]
  IsSingleContainer: !Not [!Condition IsDoubleContainer]

# ─── Resources ────────────────────────────────────────────────────────────────
Resources:
  # Missing dependency - Add this first
  FunctionManagerTargetGroupStack:
    Type: AWS::CloudFormation::Stack
    Properties:
      TemplateURL: !Sub '${TemplateBucketUrl}/target-group.yaml'  # Adjust path as needed
      Parameters:
        Environment: !Ref Environment
        AppName: !Ref AppName

  # ─────── Task Definition Double stack ─────────────────────────────
  FunctionManagerTaskDefDoubleStack:
    Type: AWS::CloudFormation::Stack
    Condition: IsDoubleContainer
    Properties:
      TemplateURL: !Sub '${TemplateBucketUrl}/rails-nginx-tf.yaml'
      Parameters:
        Environment: !Ref Environment
        AppName: !Ref AppName
        RailsImage: !Ref RailsImage
        NginxImage: !Ref NginxImage
        RailsContainerPort: 3000
        NginxContainerPort: 80
        TaskCPU: 512
        TaskMemory: 1024
        TaskRoleArn: !Sub 'arn:aws:ssm:${AWS::Region}:${AWS::AccountId}:parameter/cfn/${Environment}/iam/${AppName}/TaskRoleArn'  # Fixed SSM reference
        ExecutionRoleArn: !Sub 'arn:aws:ssm:${AWS::Region}:${AWS::AccountId}:parameter/cfn/${Environment}/ecs/TaskExecutionRoleArn'  # Fixed incomplete value

  # ─────── Task Definition Single stack ─────────────────────────────
  FunctionManagerTaskDefSingleStack:
    Type: AWS::CloudFormation::Stack
    Condition: IsSingleContainer
    Properties:
      TemplateURL: !Sub '${TemplateBucketUrl}/rails-tf.yaml'
      Parameters:
        Environment: !Ref Environment
        AppName: !Ref AppName
        RailsImage: !Ref RailsImage
        RailsContainerPort: 3000
        TaskCPU: 512
        TaskMemory: 1024
        TaskRoleArn: !Sub 'arn:aws:ssm:${AWS::Region}:${AWS::AccountId}:parameter/cfn/${Environment}/iam/${AppName}/TaskRoleArn'  # Fixed SSM reference
        ExecutionRoleArn: !Sub 'arn:aws:ssm:${AWS::Region}:${AWS::AccountId}:parameter/cfn/${Environment}/ecs/TaskExecutionRoleArn'  # Fixed SSM reference format

  # ─────── ECS Service ──────────────────────────────────────────────
  FunctionManagerECSServiceStack:
    Type: AWS::CloudFormation::Stack
    DependsOn: FunctionManagerTargetGroupStack  # Fixed missing dependency
    Properties:
      TemplateURL: !Sub '${TemplateBucketUrl}/ecs-service.yaml'
      Parameters:
        Environment: !Ref Environment
        AppName: !Ref AppName
        ECSClusterName: !Sub '{{resolve:ssm:/cfn/${Environment}/ecs/ClusterName:1}}'  # Fixed SSM parameter reference
        TaskDefinitionArn: !If
          - IsDoubleContainer
          - !GetAtt FunctionManagerTaskDefDoubleStack.Outputs.TaskDefinitionArn
          - !GetAtt FunctionManagerTaskDefSingleStack.Outputs.TaskDefinitionArn
        TargetGroupArn: !GetAtt FunctionManagerTargetGroupStack.Outputs.TargetGroupArn
        ContainerName: !If 
          - IsDoubleContainer 
          - 'nginx' 
          - 'rails'
        ContainerPort: !If 
          - IsDoubleContainer 
          - '80' 
          - '3000'
        DesiredCount: 1
        ScalingMinCapacity: 1
        ScalingMaxCapacity: 4
        CPUScaleOutThreshold: 70
        CPUScaleInThreshold: 30
        MemoryScaleOutThreshold: 75
        MemoryScaleInThreshold: 40
        VpcSubnetIds: !Sub '{{resolve:ssm:/cfn/vpc/PrivateSubnet1:1}},{{resolve:ssm:/cfn/vpc/PrivateSubnet2:1}}'  # Fixed SSM list reference
        SecurityGroupIds: !Sub '{{resolve:ssm:/cfn/${Environment}/alb/SecurityGroupId:1}}'  # Fixed SSM reference

      Tags:
        - Key: Name
          Value: !Sub '${Environment}-${AppName}-service'
        - Key: Environment
          Value: !Ref Environment
        - Key: ManagedBy
          Value: CloudFormation
