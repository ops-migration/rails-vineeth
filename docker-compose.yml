version: "3.8"

services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    volumes:
      - postgres_data:/var/lib/postgresql/data
    environment:
      POSTGRES_USER: rails
      POSTGRES_PASSWORD: password
      POSTGRES_DB: taskmanager_production
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U rails -d taskmanager_production"]
      interval: 5s
      timeout: 5s
      retries: 5

  web:
    build: .
    restart: unless-stopped
    ports:
      - "80:80"
    depends_on:
      db:
        condition: service_healthy
    environment:
      RAILS_ENV: production
      DATABASE_URL: postgresql://rails:password@db/taskmanager_production
      SECRET_KEY_BASE: "supersecretkey1234567890abcdef1234567890abcdef1234567890abcdef12"
      RAILS_LOG_TO_STDOUT: "true"
      RAILS_SERVE_STATIC_FILES: "true"

volumes:
  postgres_data: